name: Keep Render Site Awake

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        env:
          SITE_URL: ${{ secrets.SITE_URL || 'https://dodgeball-site.onrender.com' }}
        run: |
          curl --fail --silent --show-error --location "$SITE_URL" >/dev/null
