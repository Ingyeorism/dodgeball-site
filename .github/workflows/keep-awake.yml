name: Keep Render Site Awake

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "Add a SITE_URL repository secret with the deployed Render URL."
            exit 1
          fi
          curl --fail --silent --show-error --location "$SITE_URL" >/dev/null
